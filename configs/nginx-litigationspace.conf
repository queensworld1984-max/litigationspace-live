server {
    server_name litigationspace.com www.litigationspace.com;
    client_max_body_size 100M;

    # Frontend - serve static files
    root /var/www/litigationspace/frontend;
    index index.html;

    # API proxy to FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Health check proxy
    location /healthz {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # Never cache index.html (SPA entry point)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # SPA fallback - all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets (hashed filenames = safe to cache long)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/litigationspace.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/litigationspace.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.litigationspace.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = litigationspace.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name litigationspace.com www.litigationspace.com;
    client_max_body_size 100M;
    return 404; # managed by Certbot




}
